name: Build CV artifacts
on:
  push:
    paths:
      - "portfolio/src/cv/**"
      - "portfolio/scripts/build-cv.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_cv:
    name: Regenerate CV PDF + JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json
      - name: Install dependencies
        working-directory: portfolio
        run: npm ci
      - name: Install Chromium
        working-directory: portfolio
        run: npx playwright install --with-deps chromium
      - name: Generate CV artifacts
        working-directory: portfolio
        run: npm run cv:build
      - name: Commit regenerated artifacts
        run: |
          if [ -n "$(git status --porcelain portfolio/public/cv)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add portfolio/public/cv
            git commit -m "chore(cv): regenerate artifacts [skip ci]"
            git push
          else
            echo "CV artifacts already up to date."
          fi
